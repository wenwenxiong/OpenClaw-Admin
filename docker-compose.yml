services:
  openclaw-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-admin
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      - app-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/auth/config"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  app-data:
