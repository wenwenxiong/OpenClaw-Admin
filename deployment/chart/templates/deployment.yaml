apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw-admin.fullname" . }}
  labels:
    {{- include "openclaw-admin.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "openclaw-admin.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openclaw-admin.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ include "openclaw-admin.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "openclaw-admin.fullname" . }}-config
            - secretRef:
                name: {{ include "openclaw-admin.fullname" . }}-secret
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: app-data
              mountPath: /app/data
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: {{ include "openclaw-admin.fullname" . }}-data
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
