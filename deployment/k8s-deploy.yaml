apiVersion: v1
kind: Namespace
metadata:
  name: openclaw-admin
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-admin-config
  namespace: openclaw-admin
data:
  VITE_APP_TITLE: "OpenClaw-Admin"
  OPENCLAW_WS_URL: "ws://localhost:18789"
  PORT: "3000"
  LOG_LEVEL: "INFO"
  AUTH_USERNAME: "admin"
  HERMES_WEB_URL: "http://localhost:9119"
  HERMES_API_URL: "http://localhost:8642"
  VITE_TTS_ENABLED: "true"
  VITE_TTS_AUTO_PLAY: "false"
  VITE_TTS_VOICE: "zh-CN"
  VITE_TTS_RATE: "1.0"
  VITE_TTS_VOLUME: "1.0"
  VITE_TTS_PITCH: "1.0"
---
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-admin-secret
  namespace: openclaw-admin
type: Opaque
stringData:
  OPENCLAW_AUTH_TOKEN: "CHANGE_ME"
  OPENCLAW_AUTH_PASSWORD: ""
  HERMES_API_KEY: "CHANGE_ME"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-admin-data
  namespace: openclaw-admin
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-admin
  namespace: openclaw-admin
  labels:
    app: openclaw-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-admin
  template:
    metadata:
      labels:
        app: openclaw-admin
    spec:
      containers:
        - name: openclaw-admin
          image: your-registry/openclaw-admin:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: openclaw-admin-config
            - secretRef:
                name: openclaw-admin-secret
          volumeMounts:
            - name: app-data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /api/auth/config
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/auth/config
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: openclaw-admin-data
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-admin
  namespace: openclaw-admin
spec:
  type: NodePort
  selector:
    app: openclaw-admin
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30800
      protocol: TCP
